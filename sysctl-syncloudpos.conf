# =============================================================
# SYNCLOUDPOS - Linux Kernel Network Performance Tuning
# Applied to: chirpedbeo.online (6 vCPU, 12GB RAM, AMD EPYC)
# =============================================================

# TCP Congestion Control: BBR (much better than cubic for web servers)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Increase socket buffers for high throughput
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.ipv4.tcp_rmem = 4096 262144 134217728
net.ipv4.tcp_wmem = 4096 262144 134217728

# Increase connection queue sizes
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# TCP keep-alive tuning (close dead connections faster)
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# TCP performance
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_tw_reuse = 1
net.ipv4.ip_local_port_range = 1024 65535

# File descriptor limits
fs.file-max = 2097152
fs.nr_open = 2097152

# Shared memory for PostgreSQL shared_buffers
kernel.shmmax = 3221225472
kernel.shmall = 786432

# Virtual memory — prefer disk over OOM kill
vm.swappiness = 10
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
