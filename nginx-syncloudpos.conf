# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chirpedbeo.online www.chirpedbeo.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chirpedbeo.online www.chirpedbeo.online;

    ssl_certificate /etc/letsencrypt/live/chirpedbeo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chirpedbeo.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # Upload limit for product images
    client_max_body_size 20m;

    # Serve landing page accurately at root
    location = / {
        root /var/www/syncloudpos/public;
        try_files /landing.html =404;
    }

    # Try static files first, fallback to Next.js
    location / {
        root /var/www/syncloudpos/public;
        try_files $uri @nextjs;
    }

    # Proxy to Next.js cluster
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Next.js static assets - immutable cache + serve pre-compressed .gz files
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
        expires 1y;
        access_log off;
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User-uploaded files served directly via Nginx (bypass Node entirely)
    location /uploads/ {
        alias /var/www/syncloudpos/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri $uri/ =404;
    }

    # Buffered access log for performance
    access_log /var/log/nginx/syncloudpos-access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/syncloudpos-error.log warn;
}
