services:
  # ──────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: syncloudpos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: syncloud
      POSTGRES_PASSWORD: syncloud123
      POSTGRES_DB: syncloudpos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U syncloud -d syncloudpos" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - syncloud_net

  # ──────────────────────────────────
  # Redis Cache
  # ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: syncloudpos_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - syncloud_net

  # ──────────────────────────────────
  # App (migrates DB on first start)
  # ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncloudpos_app
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      DATABASE_URL: postgresql://syncloud:syncloud123@db:5432/syncloudpos
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      AUTH_URL: ${APP_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      SYNCLOUDPOS_MODE: "local"
      MACHINE_ID: ${MACHINE_ID:-}
      LICENSE_FILE: /app/license.key
    env_file:
      - .env.local
    volumes:
      - uploads_data:/app/public/uploads
      - ./license.key:/app/license.key
      - ./.local-printers.json:/app/.local-printers.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - syncloud_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  uploads_data:


networks:
  syncloud_net:
    driver: bridge
